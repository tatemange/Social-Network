<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Messagerie{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'accent':       '#2563EB',
                        'accent-hover': '#1D4ED8',
                        'accent-light': '#EFF6FF',
                        'success':      '#10B981',
                        gray: {
                            50:  '#F8FAFC',
                            100: '#F1F5F9',
                            200: '#E2E8F0',
                            300: '#CBD5E1',
                            400: '#94A3B8',
                            500: '#64748B',
                            600: '#475569',
                            700: '#334155',
                            800: '#1E293B',
                            900: '#0F172A',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft':     '0 20px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01)',
                        'floating': '0 0 50px -12px rgba(37,99,235,0.18)',
                    },
                    borderRadius: {
                        '2xl': '1rem',
                        '3xl': '1.5rem',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 999px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Focus ring */
        *:focus-visible { outline: 2px solid #2563EB; outline-offset: 2px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased">

    <!-- Toast notifications -->
    {% if messages %}
    <div id="toast-container" class="fixed top-5 right-5 z-[200] flex flex-col gap-2.5 max-w-sm">
        {% for message in messages %}
        <div class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg text-sm font-medium border animate-in
            {% if message.tags == 'error' %}bg-red-50 text-red-700 border-red-100 dark:bg-red-950/60 dark:border-red-900/50 dark:text-red-300
            {% elif message.tags == 'success' %}bg-green-50 text-green-700 border-green-100 dark:bg-green-950/60 dark:border-green-900/50 dark:text-green-300
            {% else %}bg-white text-gray-800 border-gray-100 dark:bg-gray-900 dark:border-gray-800 dark:text-gray-200{% endif %}">
            {% if message.tags == 'error' %}
            <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
            {% else %}
            <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            {% endif %}
            <span>{{ message }}</span>
        </div>
        {% endfor %}
    </div>
    <script>
        setTimeout(() => {
            const c = document.getElementById('toast-container');
            if (c) { c.style.transition='opacity 0.3s'; c.style.opacity='0'; setTimeout(()=>c.remove(),300); }
        }, 4500);
    </script>
    {% endif %}

    {% block content %}{% endblock %}

    <script>
        // Apply saved theme immediately (before paint)
        (function(){
            const d = document.documentElement;
            // Par défaut on applique le thème du système
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && systemPrefersDark)) {
                d.classList.add('dark');
            } else if (localStorage.theme === 'light') {
                d.classList.remove('dark');
            } else {
                // Si aucune préférence et system = light
                d.classList.remove('dark');
            }
        })();

        function toggleTheme() {
            const d = document.documentElement;
            if (d.classList.contains('dark')) {
                d.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                d.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
